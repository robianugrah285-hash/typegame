<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Mini TypeRacer Indonesia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Balap Mengetik 🏎️</h1>
        <div id="quote-display" class="quote-display">Klik tombol mulai untuk bermain!</div>
        <textarea id="quote-input" class="quote-input" autofocus disabled></textarea>
        
        <div class="stats">
            <div>WPM: <span id="wpm">0</span></div>
            <div>Waktu: <span id="timer">0</span>s</div>
        </div>
        
        <button id="start-btn">Mulai Balapan!</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
